<app-navbar role="owner"></app-navbar>
<div class="page-bg">
  <div class="page-container py-4">
    <h1 class="page-heading">Customer reviews</h1>
    <p class="page-sub">What drivers are saying about your stations.</p>
    <div class="reviews-layout">
      <div class="rating-summary ew-card">
        <div class="rs-score">4.3</div>
        <div class="rs-stars">★★★★☆</div>
        <div class="rs-count">6 reviews</div>
      </div>
      <div class="reviews-grid">
        <div class="review-card ew-card" *ngFor="let r of reviews">
          <div class="rv-header">
            <div class="rv-avatar">{{r.initials}}</div>
            <div><div class="rv-name">{{r.name}}</div><div class="rv-date">{{r.date}}</div></div>
            <div class="rv-stars ms-auto">{{r.stars}}</div>
          </div>
          <p class="rv-text">{{r.text}}</p>
        </div>
      </div>
    </div>
  </div>
</div>
