<app-navbar role="admin"></app-navbar>
<div class="page-bg">
  <div class="page-container py-4">
    <div class="d-flex align-items-center justify-content-between mb-4">
      <div>
        <h1 class="page-heading">All Transactions</h1>
        <p class="page-sub">Every charging session across the platform.</p>
      </div>
      <button class="btn-ew-outline" (click)="exportCSV()">
        <i class="bi bi-download"></i> Export CSV
      </button>
    </div>

    <div class="filter-row mb-3">
      <div class="search-box">
        <i class="bi bi-search"></i>
        <input type="text" placeholder="Search by ID, station, user..." [(ngModel)]="search">
      </div>
      <select class="ew-input" style="width:140px" [(ngModel)]="statusFilter">
        <option value="">All status</option>
        <option>Paid</option>
        <option>Refunded</option>
      </select>
      <input class="ew-input" type="date" style="width:160px" [(ngModel)]="dateFrom">
      <input class="ew-input" type="date" style="width:160px" [(ngModel)]="dateTo">
    </div>

    <div class="ew-card p-0">
      <table class="ew-table">
        <thead>
          <tr>
            <th>Transaction ID</th><th>User</th><th>Station</th>
            <th>Date</th><th>Energy</th><th>Total</th>
            <th>Platform Fee</th><th>Status</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let t of filteredRows()">
            <td class="fw-600">{{t.id}}</td>
            <td>{{t.user}}</td>
            <td>{{t.station}}</td>
            <td class="text-muted">{{t.date}}</td>
            <td>{{t.energy}}</td>
            <td class="fw-600">{{t.total}}</td>
            <td class="text-green">{{t.fee}}</td>
            <td>
              <span [ngClass]="t.status==='Paid'?'badge-paid':'badge-refunded'">{{t.status}}</span>
            </td>
          </tr>
        </tbody>
      </table>
      <div class="empty-rows" *ngIf="filteredRows().length === 0">
        <i class="bi bi-inbox"></i>
        <p>No transactions match your filters.</p>
      </div>
    </div>
  </div>
</div>
